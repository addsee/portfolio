<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, shrink-to-fit=yes">
  <title>مزرعة الأرقام الذكية | 0-20</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(180deg, #87CEEB 0%, #B0E0FF 25%, #A5D6A7 70%, #66BB6A 100%);
      height: 100vh;
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px max(12px, env(safe-area-inset-bottom, 12px));
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ---------- خلفية متحركة ---------- */
    .sky-element { position: fixed; pointer-events: none; z-index: 1; }
    .sun {
      top: 12px; right: 25px; width: 55px; height: 55px;
      background: radial-gradient(circle, #FFF176 30%, #FFB300 100%);
      border-radius: 50%; box-shadow: 0 0 35px #FFD54F, 0 0 80px #FFCA28;
      animation: sunGlow 3s infinite alternate;
    }
    @keyframes sunGlow {
      from { box-shadow: 0 0 30px #FFD54F, 0 0 60px #FFB300; transform: scale(1); }
      to { box-shadow: 0 0 50px #FFEE58, 0 0 90px #FFB300; transform: scale(1.08); }
    }

    .cloud {
      background: rgba(255,255,255,0.85); border-radius: 50%;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }
    .cloud1 { width: 90px; height: 35px; top: 8%; left: 12%; animation: floatCloud 9s infinite ease-in-out; }
    .cloud2 { width: 70px; height: 28px; top: 14%; right: 18%; animation: floatCloud 11s infinite ease-in-out reverse; }
    .cloud::before, .cloud::after {
      content: ''; position: absolute; background: inherit; border-radius: 50%;
    }
    .cloud1::before { width: 45px; height: 45px; top: -22px; left: 18px; }
    .cloud1::after { width: 55px; height: 50px; top: -28px; left: 40px; }
    .cloud2::before { width: 35px; height: 35px; top: -18px; left: 15px; }
    .cloud2::after { width: 40px; height: 38px; top: -22px; left: 30px; }

    @keyframes floatCloud {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(25px); }
    }

    .bird {
      font-size: 22px; animation: birdMove 7s infinite ease-in-out;
    }
    @keyframes birdMove {
      0% { transform: translate(0, 0) rotate(0deg); }
      30% { transform: translate(35px, -18px) rotate(4deg); }
      60% { transform: translate(70px, -5px) rotate(-3deg); }
      100% { transform: translate(0, 0) rotate(0deg); }
    }

    /* ---------- لوحة النتيجة ---------- */
    .top-bar {
      width: 100%; display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; background: rgba(255,255,255,0.5);
      backdrop-filter: blur(12px); border-radius: 40px;
      border: 2px solid rgba(255,255,255,0.8); z-index: 10;
      box-shadow: 0 6px 18px rgba(0,0,0,0.08);
    }
    .level-pill {
      background: #FF7043; color: white; padding: 8px 20px;
      border-radius: 30px; font-weight: bold; font-size: 1rem;
      box-shadow: 0 4px 8px rgba(255,112,67,0.3);
      animation: popBadge 2s infinite;
    }
    @keyframes popBadge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .score-badge {
      display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.8);
      padding: 8px 18px; border-radius: 30px; font-weight: bold; color: #D84315;
    }

    /* ---------- المعادلة العلوية ---------- */
    .equation-panel {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      width: 100%; margin: 8px 0; z-index: 10;
    }
    .plate-card {
      display: flex; flex-direction: column; align-items: center;
      background: rgba(255,255,255,0.65); backdrop-filter: blur(6px);
      border-radius: 24px; padding: 10px 6px; width: 35%; min-height: 100px;
      box-shadow: 0 6px 0 rgba(0,0,0,0.06), 0 10px 20px rgba(0,0,0,0.1);
      border: 2px solid rgba(255,255,255,0.9);
    }
    .fruits-row {
      display: flex; flex-wrap: wrap-reverse; justify-content: center;
      align-content: flex-end; gap: 3px; width: 100%; min-height: 48px; padding: 4px;
    }
    .plate-dish {
      width: 90%; height: 24px; background: linear-gradient(180deg, #FFF9C4, #FFD54F);
      border-radius: 45% / 22px; border: 3px solid #FFB74D;
      box-shadow: inset 0 -3px 0 #E0A800; margin-top: 4px;
    }
    .operator-sign {
      font-size: 2.6rem; font-weight: bold; color: white;
      text-shadow: 0 3px 6px rgba(0,0,0,0.3); background: rgba(255,255,255,0.25);
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      animation: bounceSign 1.2s infinite alternate;
    }
    @keyframes bounceSign {
      from { transform: translateY(0); }
      to { transform: translateY(-8px); }
    }

    /* ---------- منطقة السحب ---------- */
    .play-area {
      display: flex; width: 100%; justify-content: space-between;
      align-items: flex-end; flex: 1; position: relative; z-index: 10; margin: 4px 0;
    }
    .tree-section {
      width: 42%; height: 100%; position: relative;
      display: flex; justify-content: center; align-items: flex-end;
    }
    .trunk {
      width: 32px; height: 95px; background: linear-gradient(90deg, #6D4C41, #8D6E63, #6D4C41);
      border-radius: 15px 15px 4px 4px; position: absolute; bottom: 15px;
      z-index: 2; box-shadow: inset -3px 0 6px rgba(0,0,0,0.25);
    }
    .leaves {
      width: 140px; height: 140px; background: radial-gradient(circle at 40% 35%, #66BB6A, #2E7D32 80%);
      border-radius: 42% 42% 38% 38%; position: absolute; bottom: 75px;
      left: 50%; transform: translateX(-50%); box-shadow: 0 18px 25px rgba(0,0,0,0.2);
      display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
      padding: 18px; z-index: 3; animation: swayTree 4.5s infinite ease-in-out;
    }
    @keyframes swayTree {
      0%, 100% { transform: translateX(-50%) rotate(0deg); }
      30% { transform: translateX(-50%) rotate(2.5deg); }
      70% { transform: translateX(-50%) rotate(-2deg); }
    }

    .answer-zone {
      width: 52%; height: 100%; display: flex;
      flex-direction: column; align-items: center; justify-content: flex-end;
    }
    .drop-plate {
      width: 92%; min-height: 105px; background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px); border-radius: 28px;
      border: 3px dashed #43A047; position: relative;
      display: flex; flex-direction: column; align-items: center;
      justify-content: flex-end; padding: 8px 8px 14px;
      margin-bottom: 5px; box-shadow: inset 0 0 20px rgba(56,142,60,0.15);
      transition: all 0.25s ease;
    }
    .drop-plate.active-drop {
      border-color: #FF9800; background: rgba(255,224,130,0.45);
      box-shadow: 0 0 0 4px rgba(255,152,0,0.25), inset 0 0 25px rgba(255,152,0,0.2);
      animation: pulseBorder 1.2s infinite;
    }
    @keyframes pulseBorder {
      0%, 100% { box-shadow: 0 0 0 4px rgba(255,152,0,0.25); }
      50% { box-shadow: 0 0 0 10px rgba(255,152,0,0.1); }
    }

    /* ---------- الفاكهة ---------- */
    .fruit {
      width: 27px; height: 27px;
      background: radial-gradient(circle at 35% 35%, #FF8A80, #F44336 70%, #B71C1C 100%);
      border-radius: 50% 50% 44% 44%;
      cursor: grab; touch-action: none; position: relative;
      box-shadow: inset -3px -3px 6px rgba(0,0,0,0.3), 2px 4px 8px rgba(0,0,0,0.25);
      transition: transform 0.15s ease; z-index: 15;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    @keyframes popIn {
      0% { transform: scale(0) rotate(-40deg); opacity: 0; }
      80% { transform: scale(1.2) rotate(8deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); }
    }
    .fruit::before { content: ''; position: absolute; top: -5px; left: 50%; width: 3px; height: 7px; background: #5D4037; transform: translateX(-50%); border-radius: 2px; }
    .fruit::after { content: '🍃'; position: absolute; top: -7px; left: 50%; font-size: 10px; transform: translateX(5px); }
    .fruit.dragging {
      transform: scale(1.45) rotate(12deg); cursor: grabbing;
      z-index: 200; box-shadow: 0 12px 22px rgba(0,0,0,0.35); opacity: 0.9;
    }

    .check-btn {
      background: linear-gradient(135deg, #26C6DA, #00ACC1); color: white;
      border: none; padding: 14px 32px; font-size: 1.3rem; font-weight: bold;
      border-radius: 50px; box-shadow: 0 6px 0 #00838F, 0 8px 20px rgba(0,172,193,0.35);
      cursor: pointer; transition: all 0.15s; z-index: 20;
      width: 80%; max-width: 330px; letter-spacing: 2px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .check-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #00838F; }

    /* رسائل */
    .overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.45); z-index: 250; opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .overlay.active { opacity: 1; pointer-events: auto; }
    .message-box {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
      background: white; border-radius: 28px; padding: 28px 32px;
      text-align: center; z-index: 260; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
      font-weight: bold; font-size: 1.5rem; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .message-box.show { transform: translate(-50%, -50%) scale(1); }
    .spark {
      position: fixed; pointer-events: none; z-index: 300;
      animation: sparkUp 0.7s ease-out forwards;
    }
    @keyframes sparkUp {
      0% { transform: translate(0,0) scale(0); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.3); opacity: 0; }
    }

    @media (max-width: 380px) {
      .leaves { width: 115px; height: 115px; bottom: 70px; }
      .fruit { width: 24px; height: 24px; }
    }
  </style>
</head>
<body>
<div class="sky-element sun"></div>
<div class="sky-element cloud cloud1"></div>
<div class="sky-element cloud cloud2"></div>
<div class="sky-element bird" style="top:10%; left:20%;">🐦</div>
<div class="sky-element bird" style="top:13%; left:60%; animation-delay:1.8s;">🐦</div>

<div class="top-bar">
  <div class="level-pill" id="levelDisplay">🌟 المستوى ١</div>
  <div class="score-badge"><span>⭐</span> <span id="scoreDisplay">٠</span></div>
</div>

<div class="equation-panel">
  <div class="plate-card">
    <div class="fruits-row" id="leftFruits"></div>
    <div class="plate-dish"></div>
  </div>
  <div class="operator-sign" id="opSign">+</div>
  <div class="plate-card">
    <div class="fruits-row" id="rightFruits"></div>
    <div class="plate-dish"></div>
  </div>
</div>

<div class="play-area">
  <div class="tree-section">
    <div class="trunk"></div>
    <div class="leaves" id="treeLeaves"></div>
  </div>
  <div class="answer-zone">
    <div class="drop-plate" id="dropZone">
      <div class="fruits-row" id="answerFruits"></div>
      <div class="plate-dish"></div>
    </div>
  </div>
</div>

<button class="check-btn" id="checkButton">✨ انتهيت!</button>

<div class="overlay" id="overlay"></div>
<div class="message-box" id="messageBox"></div>

<script>
  (function() {
    // ---------- نطاق الأرقام 0-20 للعمليات (+/-) ----------
    let level = 1;
    let score = 0;
    let correctResult = 0;
    let currentOperator = '+';
    let leftNum = 0, rightNum = 0;

    // عناصر
    const leftFruitsEl = document.getElementById('leftFruits');
    const rightFruitsEl = document.getElementById('rightFruits');
    const treeLeavesEl = document.getElementById('treeLeaves');
    const answerFruitsEl = document.getElementById('answerFruits');
    const dropZone = document.getElementById('dropZone');
    const opSign = document.getElementById('opSign');
    const levelDisplay = document.getElementById('levelDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const checkBtn = document.getElementById('checkButton');
    const overlay = document.getElementById('overlay');
    const messageBox = document.getElementById('messageBox');

    // أصوات باستخدام Web Audio (نغمات خفيفة)
    let audioCtx = null;
    function initAudio() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
    }
    function playTone(freq, type = 'sine', duration = 0.15) {
      if (!audioCtx) return;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    function toArabic(num) {
      const digits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩','١٠','١١','١٢','١٣','١٤','١٥','١٦','١٧','١٨','١٩','٢٠'];
      return digits[num] || num;
    }

    // رسائل
    function showMessage(text, emoji, duration = 1400) {
      messageBox.innerHTML = `<span style="font-size:3.2rem;">${emoji}</span><br>${text}`;
      messageBox.classList.add('show');
      overlay.classList.add('active');
      setTimeout(() => {
        messageBox.classList.remove('show');
        overlay.classList.remove('active');
      }, duration);
    }

    function spawnSparks(x, y, count = 7) {
      const icons = ['✨','⭐','💫','🌟','💖'];
      for (let i=0; i<count; i++) {
        setTimeout(() => {
          const s = document.createElement('span');
          s.className = 'spark';
          s.textContent = icons[Math.floor(Math.random()*icons.length)];
          s.style.left = x + 'px'; s.style.top = y + 'px';
          s.style.fontSize = (Math.random()*18+14)+'px';
          s.style.setProperty('--dx', (Math.random()*70-35)+'px');
          s.style.setProperty('--dy', (Math.random()*-70-15)+'px');
          document.body.appendChild(s);
          setTimeout(() => s.remove(), 700);
        }, i*50);
      }
    }

    // إنشاء فاكهة
    function createFruit() {
      const f = document.createElement('div');
      f.className = 'fruit';
      f.setAttribute('data-fruit', 'true');
      return f;
    }

    // ملء الفاكهة
    function fillFruits(container, count) {
      container.innerHTML = '';
      for (let i=0; i<count; i++) {
        const fruit = createFruit();
        container.appendChild(fruit);
      }
    }

    // إعادة تعيين منطقة الإجابة
    function resetAnswerZone() {
      answerFruitsEl.innerHTML = '';
    }

    // تجهيز الشجرة (مخزون الفاكهة للسحب)
    function populateTree(count) {
      treeLeavesEl.innerHTML = '';
      for (let i=0; i<count; i++) {
        const fruit = createFruit();
        fruit.style.position = 'static';
        fruit.style.margin = '2px';
        treeLeavesEl.appendChild(fruit);
      }
    }

    // توليد مسألة (نتيجتها بين 0 و 20)
    function generateProblem() {
      let n1, n2, op, result;
      // تدرج الصعوبة
      let maxVal = Math.min(5 + level, 12); 
      if (level <= 2) {
        op = '+';
      } else {
        op = Math.random() > 0.35 ? '+' : '-';
      }
      
      if (op === '+') {
        n1 = Math.floor(Math.random() * maxVal) + 1;
        n2 = Math.floor(Math.random() * (Math.min(20 - n1, maxVal))) + 1;
        result = n1 + n2;
      } else {
        n1 = Math.floor(Math.random() * maxVal) + 1;
        n2 = Math.floor(Math.random() * (n1 + 1)); // لا سالب
        result = n1 - n2;
      }
      
      // ضمان ضمن 0-20
      if (result < 0) result = 0;
      if (result > 20) {
        if (op === '+') n2 = 20 - n1;
        else n2 = n1;
        result = op === '+' ? n1+n2 : n1-n2;
      }
      
      leftNum = n1;
      rightNum = n2;
      correctResult = result;
      currentOperator = op;
      
      opSign.textContent = op;
      fillFruits(leftFruitsEl, n1);
      fillFruits(rightFruitsEl, n2);
      resetAnswerZone();
      
      // كمية الفاكهة في الشجرة = النتيجة الصحيحة + بعض الاحتياط
      let treeStock = Math.min(result + 4, 22);
      populateTree(treeStock);
      
      levelDisplay.textContent = `🌟 المستوى ${toArabic(level)}`;
      scoreDisplay.textContent = toArabic(score);
      
      // تأثير تنشيط منطقة الإفلات
      dropZone.classList.add('active-drop');
      setTimeout(() => dropZone.classList.remove('active-drop'), 2000);
    }

    // التحقق من الإجابة
    function verifyAnswer() {
      const answerCount = answerFruitsEl.children.length;
      if (answerCount === correctResult) {
        // صحيح
        playTone(523.25, 'sine', 0.2);
        setTimeout(() => playTone(659.25, 'sine', 0.2), 200);
        const rect = checkBtn.getBoundingClientRect();
        spawnSparks(rect.left + rect.width/2, rect.top);
        showMessage('إجابة صحيحة! 🎉', '🏆');
        score++;
        level++;
        generateProblem();
      } else {
        // خطأ
        playTone(200, 'triangle', 0.3);
        showMessage(`حاول مرة أخرى! لديك ${toArabic(answerCount)} تفاحة`, '🤔', 1800);
        // اهتزاز خفيف
        dropZone.style.transform = 'translateX(6px)';
        setTimeout(() => { dropZone.style.transform = 'translateX(-6px)'; }, 100);
        setTimeout(() => { dropZone.style.transform = ''; }, 200);
      }
    }

    // ========== السحب والإفلات ==========
    let draggedItem = null;
    let startX = 0, startY = 0;
    let isDragging = false;

    function onDragStart(e) {
      initAudio();
      const target = e.target.closest('.fruit');
      if (!target || target.closest('#leftFruits') || target.closest('#rightFruits')) return;
      
      // مسموح بالسحب فقط من الشجرة أو من طبق الإجابة
      if (!target.closest('#treeLeaves') && !target.closest('#answerFruits')) return;
      
      e.preventDefault();
      draggedItem = target;
      const touch = e.touches ? e.touches[0] : e;
      startX = touch.clientX;
      startY = touch.clientY;
      isDragging = false;
      
      draggedItem.classList.add('dragging');
      playTone(440, 'sine', 0.08);
    }

    function onDragMove(e) {
      if (!draggedItem) return;
      e.preventDefault();
      const touch = e.touches ? e.touches[0] : e;
      const dx = touch.clientX - startX;
      const dy = touch.clientY - startY;
      if (Math.abs(dx) > 4 || Math.abs(dy) > 4) {
        isDragging = true;
      }
      if (isDragging) {
        draggedItem.style.position = 'fixed';
        draggedItem.style.left = touch.clientX - 15 + 'px';
        draggedItem.style.top = touch.clientY - 15 + 'px';
        draggedItem.style.zIndex = '200';
        
        // تمييز منطقة الإفلات
        const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
        if (elemBelow && (elemBelow.closest('#dropZone') || elemBelow.closest('#answerFruits'))) {
          dropZone.classList.add('active-drop');
        } else {
          dropZone.classList.remove('active-drop');
        }
      }
    }

    function onDragEnd(e) {
      if (!draggedItem) return;
      const touch = e.changedTouches ? e.changedTouches[0] : e;
      const elemBelow = document.elementFromPoint(touch.clientX, touch.clientY);
      
      draggedItem.classList.remove('dragging');
      draggedItem.style.position = '';
      draggedItem.style.left = '';
      draggedItem.style.top = '';
      draggedItem.style.zIndex = '';
      
      if (isDragging && elemBelow && (elemBelow.closest('#dropZone') || elemBelow.closest('#answerFruits'))) {
        // وضع في طبق الإجابة
        answerFruitsEl.appendChild(draggedItem);
        playTone(600, 'sine', 0.1);
        if (answerFruitsEl.children.length > 15) {
          // تذكير بصري
          dropZone.style.borderColor = '#FF7043';
          setTimeout(() => dropZone.style.borderColor = '', 400);
        }
      } else if (isDragging && elemBelow && elemBelow.closest('#treeLeaves')) {
        // إعادته للشجرة
        treeLeavesEl.appendChild(draggedItem);
      } else if (draggedItem.parentNode === answerFruitsEl) {
        // إذا كان في الإجابة وسحب خارجاً يعود للشجرة
        treeLeavesEl.appendChild(draggedItem);
      }
      
      dropZone.classList.remove('active-drop');
      draggedItem = null;
      isDragging = false;
    }

    // ربط الأحداث
    document.addEventListener('touchstart', onDragStart, {passive: false});
    document.addEventListener('touchmove', onDragMove, {passive: false});
    document.addEventListener('touchend', onDragEnd);
    document.addEventListener('mousedown', onDragStart);
    document.addEventListener('mousemove', onDragMove);
    document.addEventListener('mouseup', onDragEnd);

    checkBtn.addEventListener('click', verifyAnswer);
    
    // بداية اللعبة
    generateProblem();
  })();
</script>
</body>
</html>
