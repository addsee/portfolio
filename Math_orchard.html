<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>🍎 بستان الأرقام</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-top:#5EC3FF; --sky-bottom:#E7F8FF;
    --grass:#8FD48A; --grass-deep:#4F9A5B;
    --sun:#FFD166; --sun-deep:#F4A227;
    --apple:#FF5D5D; --apple-deep:#C62828;
    --wood:#B07A44; --wood-deep:#7A4E28;
    --cream:#FFF6E0; --mint:#3FBDB0; --mint-deep:#1F8F84;
    --ink:#5B4530;
  }
  *{box-sizing:border-box;user-select:none;-webkit-user-select:none;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation;}
  html,body{height:100%;}
  body{
    font-family:'Baloo Bhaijaan 2',sans-serif;
    background:linear-gradient(180deg,var(--sky-top) 0%, var(--sky-bottom) 38%, #CDEFC3 62%, var(--grass) 100%);
    height:100vh;height:100dvh;width:100vw;overflow:hidden;
    display:flex;flex-direction:column;align-items:center;justify-content:space-between;
    padding:12px 12px max(18px, env(safe-area-inset-bottom,18px));
    position:fixed;top:0;left:0;
  }

  /* ---------- ambient background ---------- */
  .sun{position:fixed;top:16px;left:20px;width:54px;height:54px;border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #FFE9A8, var(--sun) 60%, var(--sun-deep) 100%);
    box-shadow:0 0 30px rgba(255,209,102,.7);pointer-events:none;z-index:0;animation:sunPulse 4s infinite;}
  @keyframes sunPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
  .cloud{position:fixed;background:#fff;border-radius:50px;opacity:.8;pointer-events:none;z-index:0;}
  .cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%;}
  .cloud1{width:70px;height:26px;top:9%;right:12%;animation:cloudFloat 9s infinite ease-in-out;}
  .cloud1::before{width:30px;height:30px;top:-15px;left:12px;}
  .cloud1::after{width:38px;height:34px;top:-19px;left:30px;}
  .cloud2{width:56px;height:20px;top:18%;right:32%;animation:cloudFloat 12s infinite ease-in-out reverse;}
  .cloud2::before{width:24px;height:24px;top:-12px;left:10px;}
  .cloud2::after{width:30px;height:26px;top:-14px;left:24px;}
  @keyframes cloudFloat{0%,100%{transform:translateX(0)}50%{transform:translateX(-25px)}}
  .bird{position:fixed;pointer-events:none;z-index:1;animation:birdFly 6s infinite ease-in-out;font-size:18px;}
  @keyframes birdFly{0%{transform:translate(0,0) rotate(0)}25%{transform:translate(-30px,-16px) rotate(-5deg)}50%{transform:translate(-60px,0) rotate(0)}75%{transform:translate(-30px,-10px) rotate(5deg)}100%{transform:translate(0,0) rotate(0)}}

  /* ---------- header: icons + digits only, no words ---------- */
  header{width:100%;display:flex;justify-content:space-between;align-items:center;
    padding:10px 16px;background:rgba(255,255,255,.45);border-radius:24px;
    backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.7);z-index:10;
    box-shadow:0 4px 15px rgba(0,0,0,.08);}
  .badge{display:flex;align-items:center;gap:6px;font-weight:800;font-size:1.15rem;color:var(--ink);
    background:rgba(255,255,255,.6);padding:6px 14px;border-radius:18px;}
  .badge.level{background:linear-gradient(135deg,#FF9F6B,#FF6B6B);color:#fff;
    box-shadow:0 4px 12px rgba(255,107,107,.35);animation:badgePulse 2.4s infinite;}
  @keyframes badgePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  .badge .icon{font-size:1.3rem;}

  /* ---------- problem row ---------- */
  .math-row{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;margin:6px 0;z-index:5;}
  .plate{flex:1;max-width:38%;min-height:96px;background:rgba(255,255,255,.55);
    border-radius:22px;padding:10px 6px;display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 0 rgba(0,0,0,.07),0 8px 18px rgba(0,0,0,.1);border:2px solid rgba(255,255,255,.85);
    backdrop-filter:blur(4px);}
  .apple-grid{display:flex;flex-wrap:wrap;justify-content:center;align-content:center;gap:3px;width:100%;}
  .operator{font-size:2rem;font-weight:800;color:#fff;width:46px;height:46px;flex:0 0 auto;
    display:flex;align-items:center;justify-content:center;border-radius:50%;
    background:linear-gradient(135deg,var(--mint),var(--mint-deep));
    box-shadow:0 4px 10px rgba(0,0,0,.2);animation:opBounce 1.1s infinite alternate;}
  @keyframes opBounce{to{transform:translateY(-6px)}}

  /* mini apples used inside plates (display only) */
  .mini-apple{border-radius:50% 50% 45% 45%;background:radial-gradient(circle at 35% 35%,#FF8A80,var(--apple) 70%,var(--apple-deep) 100%);
    box-shadow:inset -2px -2px 4px rgba(0,0,0,.25);flex:0 0 auto;position:relative;}
  .mini-apple.remove{opacity:.4;filter:grayscale(45%);}
  .mini-apple.remove::after{content:'✖';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:60%;color:#7A2020;}

  /* ---------- playground ---------- */
  .playground{display:flex;width:100%;justify-content:space-between;align-items:flex-end;flex:1;position:relative;z-index:5;margin:2px 0;}
  .tree-zone{width:44%;height:100%;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
  .tree-trunk{width:30px;height:78px;background:linear-gradient(90deg,#795548,#8D6E63,#795548);
    border-radius:14px 14px 4px 4px;box-shadow:inset -3px 0 5px rgba(0,0,0,.2);z-index:1;}
  .tree-leaves{width:130px;height:130px;margin-bottom:-40px;border-radius:46% 46% 40% 40%;
    background:radial-gradient(ellipse,#43A047 40%,#2E7D32 72%,#1B5E20 100%);
    box-shadow:0 12px 18px rgba(0,0,0,.15),inset -14px -14px 18px rgba(0,0,0,.15);
    z-index:3;animation:treeSway 4.2s infinite ease-in-out;cursor:pointer;position:relative;}
  @keyframes treeSway{0%,100%{transform:rotate(0)}30%{transform:rotate(2deg)}70%{transform:rotate(-1.5deg)}}
  .tree-leaves.shake{animation:treeShake .4s;}
  @keyframes treeShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .basket{width:88%;min-height:58px;background:rgba(255,255,255,.4);border-radius:18px;
    border:2px dashed rgba(122,78,40,.5);display:flex;flex-wrap:wrap;align-content:flex-end;justify-content:center;
    gap:4px;padding:6px;position:relative;z-index:2;margin-top:4px;}
  .basket-icon{position:absolute;bottom:-6px;right:-2px;font-size:1.6rem;opacity:.85;pointer-events:none;}

  .answer-zone{width:50%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;}
  .answer-plate{width:94%;min-height:104px;background:rgba(255,255,255,.4);border-radius:26px;
    border:3px dashed #57B85A;display:flex;flex-wrap:wrap;align-content:flex-end;justify-content:center;
    gap:4px;padding:10px;margin-bottom:4px;position:relative;transition:box-shadow .3s;}
  .answer-plate.highlight{animation:glowPulse 1.4s infinite;}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 12px rgba(87,184,90,.25)}50%{box-shadow:0 0 26px rgba(87,184,90,.55)}}
  .answer-plate.shake{animation:plateShake .45s;}
  @keyframes plateShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  .ghost-hint{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    pointer-events:none;font-size:2.4rem;opacity:0;animation:ghostFade 2.4s infinite;}
  @keyframes ghostFade{0%,100%{opacity:0;transform:scale(.7)}50%{opacity:.28;transform:scale(1)}}
  .guide-hand{position:absolute;bottom:26%;font-size:1.8rem;z-index:6;pointer-events:none;opacity:0;
    animation:guideMove 2.6s infinite ease-in-out;filter:drop-shadow(0 3px 4px rgba(0,0,0,.25));}
  @keyframes guideMove{
    0%{opacity:0; left:36%; transform:scale(.9) rotate(-8deg);}
    12%{opacity:1;}
    45%{opacity:1; left:60%; transform:scale(1.05) rotate(4deg);}
    60%{opacity:0; left:62%;}
    100%{opacity:0; left:36%;}
  }

  /* ---------- draggable apple (tree + answer) ---------- */
  .apple{width:32px;height:32px;border-radius:50% 50% 45% 45%;position:relative;cursor:grab;touch-action:none;
    background:radial-gradient(circle at 35% 35%,#FF8A80,var(--apple) 70%,var(--apple-deep) 100%);
    box-shadow:inset -3px -3px 5px rgba(0,0,0,.25),2px 3px 6px rgba(0,0,0,.2);
    animation:appleAppear .35s ease;z-index:10;flex:0 0 auto;}
  @keyframes appleAppear{0%{transform:scale(0) rotate(-30deg);opacity:0;}70%{transform:scale(1.15) rotate(5deg);opacity:1;}100%{transform:scale(1) rotate(0);}}
  .apple::before{content:'';position:absolute;top:-5px;left:50%;width:3px;height:8px;background:#5D4037;transform:translateX(-50%);border-radius:2px;}
  .apple::after{content:'🍃';position:absolute;top:-8px;left:50%;font-size:10px;transform:translateX(5px);}
  .apple.dragging{transform:scale(1.35) rotate(8deg);cursor:grabbing;box-shadow:0 10px 22px rgba(0,0,0,.35);opacity:.95;}
  .apple.poof{animation:poof .3s forwards;}
  @keyframes poof{to{transform:scale(0) rotate(40deg);opacity:0;}}

  /* ---------- mascot ---------- */
  .mascot{position:fixed;bottom:96px;left:14px;font-size:2.4rem;z-index:20;pointer-events:none;
    transition:transform .25s;filter:drop-shadow(0 4px 6px rgba(0,0,0,.2));}
  .mascot.bounce{animation:mascotBounce .5s;}
  @keyframes mascotBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-14px) scale(1.15);}}
  .mascot.wobble{animation:mascotWobble .5s;}
  @keyframes mascotWobble{0%,100%{transform:rotate(0);}25%{transform:rotate(-12deg);}75%{transform:rotate(12deg);}}

  /* ---------- check button: icon only, animation invites the tap ---------- */
  .check-btn{position:relative;width:78px;height:78px;border-radius:50%;border:none;z-index:10;
    background:linear-gradient(135deg,var(--mint),var(--mint-deep));
    box-shadow:0 7px 0 var(--mint-deep,#1B8A7A),0 10px 22px rgba(38,166,154,.35);
    display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .check-btn svg{width:34px;height:34px;}
  .check-btn::before,.check-btn::after{content:'';position:absolute;inset:-6px;border-radius:50%;
    border:3px solid var(--mint);opacity:0;animation:ripple 2.2s infinite;}
  .check-btn::after{animation-delay:1.1s;}
  @keyframes ripple{0%{opacity:.6;transform:scale(1);}100%{opacity:0;transform:scale(1.7);}}
  .check-btn.pressed{transform:translateY(5px);box-shadow:0 2px 0 var(--mint-deep,#1B8A7A),0 4px 10px rgba(38,166,154,.35);}

  /* ---------- sparkles ---------- */
  .sparkle{position:fixed;pointer-events:none;z-index:150;animation:sparkleAnim .8s ease-out forwards;}
  @keyframes sparkleAnim{0%{transform:translate(0,0) scale(0) rotate(0);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(1.5) rotate(180deg);opacity:0;}}

  .fly-star{position:fixed;pointer-events:none;z-index:160;font-size:1.4rem;transition:all .6s cubic-bezier(.2,.8,.3,1);}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001s !important; animation-iteration-count:1 !important;}
  }
  @media (max-width:360px){
    .tree-leaves{width:104px;height:104px;}
    .apple{width:26px;height:26px;}
    .check-btn{width:66px;height:66px;}
  }
</style>
</head>
<body>

  <div class="sun"></div>
  <div class="cloud cloud1"></div>
  <div class="cloud cloud2"></div>
  <div class="bird" style="top:11%;right:20%;">🐦</div>
  <div class="bird" style="top:16%;right:48%;animation-delay:1.5s;font-size:15px;">🐦</div>

  <header>
    <div class="badge level"><span class="icon">🌳</span><span id="levelDigit">١</span></div>
    <div class="badge"><span class="icon">⭐</span><span id="scoreDigit">٠</span></div>
  </header>

  <div class="math-row">
    <div class="plate"><div class="apple-grid" id="plate1"></div></div>
    <div class="operator" id="opSymbol">+</div>
    <div class="plate"><div class="apple-grid" id="plate2"></div></div>
  </div>

  <div class="playground">
    <div class="tree-zone">
      <div class="tree-leaves" id="treeLeaves"></div>
      <div class="tree-trunk"></div>
      <div class="basket" id="basket"><span class="basket-icon">🧺</span></div>
    </div>

    <div class="answer-zone">
      <div class="answer-plate highlight" id="answerPlate">
        <div class="ghost-hint" id="ghostHint">🍎</div>
      </div>
    </div>

    <div class="guide-hand" id="guideHand">👆</div>
  </div>

  <div class="mascot" id="mascot">🦊</div>

  <button class="check-btn" id="checkBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4,13 9,18 20,6"></polyline>
    </svg>
  </button>

<script>
(function(){
  const arDigits = ['٠','١','٢','٣','٤','٥','٦','٧','٨','٩','١٠','١١','١٢','١٣','١٤','١٥','١٦','١٧','١٨','١٩','٢٠'];
  const toAr = n => arDigits[n] !== undefined ? arDigits[n] : String(n);

  const $ = id => document.getElementById(id);
  const plate1 = $('plate1'), plate2 = $('plate2'), opSymbol = $('opSymbol');
  const treeLeaves = $('treeLeaves'), basket = $('basket'), answerPlate = $('answerPlate');
  const ghostHint = $('ghostHint'), guideHand = $('guideHand'), mascot = $('mascot');
  const checkBtn = $('checkBtn'), levelDigit = $('levelDigit'), scoreDigit = $('scoreDigit');

  let state = { level:1, score:0, num1:0, num2:0, op:'+', answer:0, firstTimeHint:true };
  let audioCtx = null;

  /* ---------------- audio ---------------- */
  function ensureAudio(){
    if(!audioCtx){
      try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    }
    if(audioCtx.state === 'suspended') audioCtx.resume();
  }
  function tone(freq, start, dur, type, vol){
    if(!audioCtx) return;
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    const t0 = audioCtx.currentTime + start;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.linearRampToValueAtTime(vol||0.16, t0+0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(t0); o.stop(t0+dur+0.02);
  }
  function playPop(){ tone(520,0,0.09,'triangle',0.12); }
  function playCorrect(){ tone(523,0,0.14,'sine',0.15); tone(659,0.12,0.16,'sine',0.15); tone(784,0.24,0.28,'sine',0.16); }
  function playWrong(){ tone(300,0,0.14,'sine',0.12); tone(220,0.13,0.22,'sine',0.11); }

  /* ---------------- helpers ---------------- */
  function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }

  function pickProblem(level){
    const maxSum = Math.min(6 + level*2, 20);
    const isAdd = level <= 2 ? true : Math.random() > 0.4;
    let num1, num2, answer, op;
    if(isAdd){
      op = '+';
      answer = randInt(2, maxSum);
      num1 = randInt(1, answer-1);
      num2 = answer - num1;
    } else {
      op = '-';
      num1 = randInt(2, maxSum);
      num2 = randInt(level < 4 ? 1 : 0, num1 - 1);
      answer = num1 - num2;
    }
    return {op, num1, num2, answer};
  }

  function appleSize(count){
    if(count <= 6) return 24;
    if(count <= 12) return 18;
    return 14;
  }

  function fillPlate(container, count, removeStyle){
    container.innerHTML = '';
    const size = appleSize(count);
    for(let i=0;i<count;i++){
      const d = document.createElement('div');
      d.className = 'mini-apple' + (removeStyle ? ' remove' : '');
      d.style.width = size+'px';
      d.style.height = size+'px';
      container.appendChild(d);
    }
  }

  function newProblem(){
    const p = pickProblem(state.level);
    state.num1 = p.num1; state.num2 = p.num2; state.op = p.op; state.answer = p.answer;
    opSymbol.textContent = p.op;
    fillPlate(plate1, p.num1, false);
    fillPlate(plate2, p.num2, p.op === '-');
    answerPlate.querySelectorAll('.apple').forEach(a => a.remove());
    basket.querySelectorAll('.apple').forEach(a => a.remove());
    updateGhostHint();
  }

  function updateGhostHint(){
    const count = answerPlate.querySelectorAll('.apple').length;
    ghostHint.style.display = count === 0 ? 'flex' : 'none';
    guideHand.style.display = (count === 0 && state.firstTimeHint) ? 'block' : 'none';
  }

  function updateBadges(){
    levelDigit.textContent = toAr(state.level);
    scoreDigit.textContent = toAr(state.score);
  }

  function setMascot(kind){
    mascot.classList.remove('bounce','wobble');
    if(kind === 'happy'){ mascot.textContent = '🦊'; void mascot.offsetWidth; mascot.classList.add('bounce'); }
    else if(kind === 'sad'){ mascot.textContent = '🙈'; void mascot.offsetWidth; mascot.classList.add('wobble'); setTimeout(()=> mascot.textContent='🦊', 900); }
    else { mascot.textContent = '🦊'; }
  }

  function sparkleBurst(x, y, count){
    const emojis = ['✨','⭐','💫','🌟'];
    for(let i=0;i<(count||8);i++){
      setTimeout(()=>{
        const s = document.createElement('span');
        s.className = 'sparkle';
        s.textContent = emojis[Math.floor(Math.random()*emojis.length)];
        s.style.left = x+'px'; s.style.top = y+'px';
        s.style.fontSize = (Math.random()*18+14)+'px';
        s.style.setProperty('--dx', (Math.random()*90-45)+'px');
        s.style.setProperty('--dy', (Math.random()*-90-20)+'px');
        document.body.appendChild(s);
        setTimeout(()=> s.remove(), 800);
      }, i*50);
    }
  }

  function flyStarToScore(){
    const from = answerPlate.getBoundingClientRect();
    const to = scoreDigit.getBoundingClientRect();
    const star = document.createElement('div');
    star.className = 'fly-star';
    star.textContent = '⭐';
    star.style.left = (from.left + from.width/2) + 'px';
    star.style.top = (from.top + from.height/2) + 'px';
    document.body.appendChild(star);
    requestAnimationFrame(()=>{
      star.style.left = (to.left + to.width/2) + 'px';
      star.style.top = (to.top + to.height/2) + 'px';
      star.style.transform = 'scale(.3)';
      star.style.opacity = '0.2';
    });
    setTimeout(()=> star.remove(), 650);
  }

  /* ---------------- spawning apples in basket ---------------- */
  function spawnTreeApple(){
    if(basket.querySelectorAll('.apple').length >= 8){
      treeLeaves.classList.remove('shake'); void treeLeaves.offsetWidth; treeLeaves.classList.add('shake');
      return;
    }
    ensureAudio();
    const apple = createDraggableApple('tree');
    basket.appendChild(apple);
    playPop();
  }

  /* ---------------- drag logic ---------------- */
  let dragState = null;

  function createDraggableApple(origin){
    const el = document.createElement('div');
    el.className = 'apple';
    el.addEventListener('pointerdown', (e)=> startDrag(e, el, origin));
    return el;
  }

  function startDrag(e, apple, origin){
    e.preventDefault();
    ensureAudio();
    const rect = apple.getBoundingClientRect();
    dragState = {
      apple, origin,
      startX: e.clientX, startY: e.clientY,
      offsetX: e.clientX - rect.left, offsetY: e.clientY - rect.top,
      origParent: apple.parentElement, origNext: apple.nextSibling,
      moved: false
    };
    apple.classList.add('dragging');
    apple.style.position = 'fixed';
    apple.style.left = rect.left+'px'; apple.style.top = rect.top+'px';
    apple.style.width = rect.width+'px'; apple.style.height = rect.height+'px';
    apple.style.zIndex = 999;
    document.body.appendChild(apple);
    try{ apple.setPointerCapture(e.pointerId); }catch(err){}
    apple.addEventListener('pointermove', onDragMove);
    apple.addEventListener('pointerup', onDragEnd);
    apple.addEventListener('pointercancel', onDragEnd);
  }

  function onDragMove(e){
    if(!dragState) return;
    const dx = e.clientX - dragState.startX, dy = e.clientY - dragState.startY;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4) dragState.moved = true;
